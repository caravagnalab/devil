on:
  push:
    branches: [main, devel]
  pull_request:
    branches: [main]

name: BiocCheck

jobs:
  BiocCheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'devel'
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::rcmdcheck
            any::BiocCheck
          needs: check

      - name: Run BiocCheck
        run: BiocCheck::BiocCheck(".", new.pkg = TRUE)
        shell: Rscript {0}
